spring.application.name=task-management-system-backend
server.port=8080

#Mongodb configuration
spring.data.mongodb.uri=mongodb://localhost:27017/taskmanagementsystem

# JWT configuration
app.jwt.access-token-secret=${JWT_ACCESS_SECRET:ChangeThisToAStrongAccessTokenSecretKeyWithAtLeast32Chars123!}
app.jwt.refresh-token-secret=${JWT_REFRESH_SECRET:ChangeThisToAStrongRefreshTokenSecretKeyWithAtLeast32Chars456!}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}